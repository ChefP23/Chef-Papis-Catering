<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#121e36"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="760" height="560" rx="8" ry="8" fill="none" stroke="#d4a843" stroke-width="1.5" opacity="0.4"/>
  <rect x="30" y="30" width="740" height="540" rx="6" ry="6" fill="none" stroke="#d4a843" stroke-width="0.5" opacity="0.25"/>

  <!-- Corner accents -->
  <line x1="20" y1="60" x2="60" y2="20" stroke="#d4a843" stroke-width="1" opacity="0.3"/>
  <line x1="740" y1="20" x2="780" y2="60" stroke="#d4a843" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="540" x2="60" y2="580" stroke="#d4a843" stroke-width="1" opacity="0.3"/>
  <line x1="740" y1="580" x2="780" y2="540" stroke="#d4a843" stroke-width="1" opacity="0.3"/>

  <!-- Fork and knife icon -->
  <g transform="translate(400, 210)" opacity="0.85">
    <!-- Fork -->
    <g transform="translate(-50, 0)">
      <line x1="0" y1="-60" x2="0" y2="60" stroke="#d4a843" stroke-width="3" stroke-linecap="round"/>
      <line x1="-12" y1="-60" x2="-12" y2="-20" stroke="#d4a843" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="12" y1="-60" x2="12" y2="-20" stroke="#d4a843" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="-60" x2="0" y2="-20" stroke="#d4a843" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M-12,-20 Q-12,-10 0,-8 Q12,-10 12,-20" fill="none" stroke="#d4a843" stroke-width="2.5"/>
    </g>
    <!-- Knife -->
    <g transform="translate(50, 0)">
      <line x1="0" y1="-10" x2="0" y2="60" stroke="#d4a843" stroke-width="3" stroke-linecap="round"/>
      <path d="M0,-60 Q15,-40 12,-10 L0,-10 Z" fill="#d4a843" opacity="0.7"/>
      <path d="M0,-60 Q15,-40 12,-10 L0,-10 Z" fill="none" stroke="#d4a843" stroke-width="2"/>
    </g>
  </g>

  <!-- Decorative divider above text -->
  <line x1="250" y1="300" x2="550" y2="300" stroke="#d4a843" stroke-width="1" opacity="0.5"/>
  <circle cx="400" cy="300" r="4" fill="#d4a843" opacity="0.6"/>
  <circle cx="250" cy="300" r="2" fill="#d4a843" opacity="0.4"/>
  <circle cx="550" cy="300" r="2" fill="#d4a843" opacity="0.4"/>

  <!-- Main title -->
  <text x="400" y="360" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-size="32" font-weight="700" fill="#d4a843" letter-spacing="1">
    Fried Chicken Sandwich
  </text>
  <text x="400" y="400" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-size="28" font-weight="700" fill="#d4a843" letter-spacing="1">
    &amp; Boardwalk Fries
  </text>

  <!-- Decorative divider below title -->
  <line x1="300" y1="425" x2="500" y2="425" stroke="#d4a843" stroke-width="0.75" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="400" y="465" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="22" fill="#d4a843" opacity="0.8" letter-spacing="2">
    $20
  </text>
  <text x="400" y="500" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-size="16" fill="#d4a843" opacity="0.6" letter-spacing="4" text-transform="uppercase">
    Chef Papi's Catering
  </text>

  <!-- Bottom decorative line -->
  <line x1="340" y1="530" x2="460" y2="530" stroke="#d4a843" stroke-width="0.5" opacity="0.3"/>
</svg>